services:
  # ---------------------------------------------------------------------------
  # Инфраструктура
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-implify}
      POSTGRES_USER: ${POSTGRES_USER:-implify}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-implify} -d ${POSTGRES_DB:-implify}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:v24.1.7
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  # ---------------------------------------------------------------------------
  # Сервисы приложения (добавляются по мере реализации фаз)
  # ---------------------------------------------------------------------------
  core-java:
    build: ./services/core-java
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-implify}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-implify}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-change_me_local}
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-change_me_at_least_32_bytes_long_secret_key}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      KAFKA_BOOTSTRAP: redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
    profiles: ["app"]

  matching-python:
    build: ./services/matching-python
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-implify}:${POSTGRES_PASSWORD:-change_me_local}@postgres:5432/${POSTGRES_DB:-implify}
      KAFKA_BOOTSTRAP: redpanda:9092
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["app"]

  geo-rust:
    build: ./services/geo-rust
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-implify}:${POSTGRES_PASSWORD:-change_me_local}@postgres:5432/${POSTGRES_DB:-implify}
      REDIS_URL: redis://redis:6379
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["app"]

  web:
    build: ./web
    ports:
      - "5173:80"
    depends_on:
      - core-java
    profiles: ["app"]

volumes:
  pgdata:
