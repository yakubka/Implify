global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: core-java
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["core-java:8080"]

  - job_name: geo-rust
    metrics_path: /metrics
    static_configs:
      - targets: ["geo-rust:8090"]

  - job_name: matching-python
    metrics_path: /metrics
    static_configs:
      - targets: ["matching-python:8000"]
