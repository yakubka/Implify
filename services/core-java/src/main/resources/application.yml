spring:
  application:
    name: implify-core

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/implify}
    username: ${SPRING_DATASOURCE_USERNAME:implify}
    password: ${SPRING_DATASOURCE_PASSWORD:change_me_local}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      missing-topics-fatal: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change_me_at_least_32_bytes_long_secret_key}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  kafka:
    topic:
      request-events: request.events
      response-events: response.events

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
